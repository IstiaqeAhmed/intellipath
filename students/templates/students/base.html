<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliPath - 2026 Edition</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050914;
        }
        
        body {
            background-color: var(--dark-bg);
            font-family: 'Hind Siliguri', sans-serif;
            color: #fff;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            background-attachment: fixed;
        }

        /* 🚀 Glassmorphism Navbar */
        .glass-navbar {
            background: rgba(5, 9, 20, 0.8) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 4px 30px rgba(0, 243, 255, 0.1);
        }

        /* 💎 Dynamic Glowing Brand */
       /* 💎 Ultra-Modern Subtle Shimmer Animation */
        .neon-brand {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            /* তিনটি রঙের লেয়ার দিয়ে শিমার তৈরি */
            background: linear-gradient(
                90deg, 
                #00f3ff, 
                #bc13fe, 
                #00f3ff
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* দপদপানি কমিয়ে খুব ধীর গতির এনিমেশন */
            animation: shine 5s linear infinite; 
            letter-spacing: 1px;
            filter: drop-shadow(0 0 5px rgba(0, 243, 255, 0.3));
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        /* 🚀 রকেট আইকনের জন্য প্রশান্তিদায়ক ভাসমান ইফেক্ট */
        .fa-rocket-launch, .fa-rocket {
            display: inline-block;
            animation: float-slow 4s ease-in-out infinite;
            color: var(--neon-blue);
            filter: drop-shadow(0 0 8px var(--neon-blue));
        }

        @keyframes float-slow {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(5deg); }
        }

        .cyber-link { 
            color: #fff !important; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            transition: 0.3s; 
        }
        .cyber-link:hover { 
            color: var(--neon-blue) !important; 
            text-shadow: 0 0 10px var(--neon-blue); 
        }

        /* 🔘 Custom Futuristic Buttons */
        .btn-neon-outline-sm {
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-neon-outline-sm:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .btn-cyber-danger {
            background: transparent;
            border: 1px solid #ff0055;
            color: #ff0055;
            border-radius: 50px;
            padding: 8px 15px;
            transition: 0.3s;
        }
        .btn-cyber-danger:hover {
            background: #ff0055;
            color: #fff;
            box-shadow: 0 0 15px #ff0055;
        }


    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg glass-navbar sticky-top py-3">
        <div class="container">
            <a class="navbar-brand neon-brand" href="{% url 'home' %}">
                <i class="fas fa-rocket fa-spin-slow me-2"></i>IntelliPath
            </a>
            
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="fas fa-bolt text-info"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-lg-3">
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link cyber-link" href="{% url 'dashboard' %}">
                                <i class="fas fa-chart-line me-1 text-info"></i> ড্যাশবোর্ড
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link cyber-link" href="{% url 'profile' %}">
                                <i class="fas fa-user-astronaut me-1 text-info"></i> প্রোফাইল
                            </a>
                        </li>
                      <li class="nav-item">
    <form action="{% url 'logout' %}" method="post" class="m-0">
        {% csrf_token %}
        <button type="submit" class="btn btn-cyber-danger d-flex align-items-center gap-2 px-3">
            <i class="fas fa-power-off"></i>
            <span class="fw-bold" style="font-size: 0.9rem;">লগআউট</span>
        </button>
    </form>
</li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link cyber-link" href="{% url 'login' %}">লগইন</a>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-neon-outline-sm" href="{% url 'register' %}">রেজিস্ট্রেশন</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% if messages %}
            <div class="container mt-3">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" 
                         style="background: rgba(255,255,255,0.1); border: 1px solid var(--neon-blue); color: #fff; backdrop-filter: blur(10px);" 
                         role="alert">
                        {{ message }}
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
