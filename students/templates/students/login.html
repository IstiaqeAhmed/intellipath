{% extends 'students/base.html' %}

{% block content %}
<style>
    /* 🌌 সাইবার সিকিউরিটি থিম কন্টেইনার */
    .auth-container { 
        min-height: 85vh; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        padding: 40px 20px;
    }
    
    /* 🛡️ Cyber Login Card */
    .login-vault-card {
        background: rgba(13, 20, 36, 0.9); 
        backdrop-filter: blur(25px);
        border: 1px solid rgba(0, 243, 255, 0.3); 
        border-radius: 30px;
        width: 100%; 
        max-width: 450px; 
        overflow: hidden;
        box-shadow: 0 0 50px rgba(0, 243, 255, 0.15);
        position: relative;
    }

    /* উপরের গ্লোয়িং বার */
    .login-vault-card::before {
        content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px;
        background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
    }

    /* ⌨️ Futuristic Inputs */
    .login-vault-card input {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: #fff !important; 
        border-radius: 15px !important; 
        padding: 15px 20px !important;
        transition: 0.4s !important;
        width: 100%;
        font-family: 'Poppins', sans-serif;
    }
    .login-vault-card input:focus {
        border-color: var(--neon-blue) !important;
        box-shadow: 0 0 20px rgba(0, 243, 255, 0.4) !important;
        background: rgba(255, 255, 255, 0.08) !important;
        outline: none;
    }
    
    .input-icon-label { 
        font-size: 0.8rem; 
        color: var(--neon-blue); 
        text-transform: uppercase; 
        letter-spacing: 2px; 
        margin-bottom: 10px; 
        font-weight: 700;
        display: flex;
        align-items: center;
    }

    /* 🚀 Action Button */
    .btn-cyber-login {
        background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
        border: none; 
        border-radius: 50px; 
        padding: 15px; 
        font-weight: 800;
        color: white;
        text-transform: uppercase; 
        letter-spacing: 2px; 
        transition: 0.4s;
        box-shadow: 0 10px 20px rgba(0, 243, 255, 0.2);
    }
    .btn-cyber-login:hover { 
        transform: translateY(-3px) scale(1.02); 
        box-shadow: 0 15px 30px var(--neon-blue); 
        color: white;
    }

    .scanner-line {
        position: absolute; width: 100%; height: 2px; background: var(--neon-blue);
        opacity: 0.3; top: 0; left: 0; animation: scan-move 4s linear infinite;
        pointer-events: none;
    }
    @keyframes scan-move { 0% { top: 0; } 100% { top: 100%; } }
</style>

<div class="auth-container">
    <div class="login-vault-card p-4 p-md-5">
        <div class="scanner-line"></div>
        
        <div class="text-center mb-5">
            <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 70px; height: 70px; background: rgba(0, 243, 255, 0.1); border: 2px solid var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue);">
                <i class="fas fa-fingerprint fa-2x" style="color: var(--neon-blue);"></i>
            </div>
            <h2 class="fw-bolder text-white" style="font-family: 'Orbitron'; letter-spacing: 3px;">SYSTEM ACCESS</h2>
            <p class="text-info opacity-75 small">অনুগ্রহ করে আপনার আইডেন্টিটি ভেরিফাই করুন</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="alert alert-danger py-2 px-3 mb-4" style="background: rgba(255,0,85,0.1); border: 1px solid var(--neon-pink); color: #fff; font-size: 0.85rem;">
                    <i class="fas fa-shield-virus me-2"></i> ভুল ইউজারনেম অথবা পাসওয়ার্ড!
                </div>
            {% endif %}

            <div class="mb-4">
                <label class="input-icon-label">
                    <i class="fas fa-user-shield me-2"></i> Username
                </label>
                <input type="text" name="username" placeholder="আপনার ইউজারনেম দিন" required autofocus>
            </div>

            <div class="mb-5">
                <label class="input-icon-label">
                    <i class="fas fa-key me-2"></i> Password
                </label>
                <input type="password" name="password" placeholder="আপনার গোপন পাসওয়ার্ড" required>
            </div>

            <button type="submit" class="btn btn-cyber-login w-100">
                এক্সেস ভেরিফাই করুন <i class="fas fa-sign-in-alt ms-2"></i>
            </button>
        </form>

        <div class="text-center mt-5 pt-3 border-top" style="border-color: rgba(255,255,255,0.1) !important;">
            <p class="text-silver mb-0 small">অ্যাকাউন্ট নেই? 
                <a href="{% url 'register' %}" class="fw-bold text-decoration-none" style="color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue);">রেজিস্ট্রেশন করুন</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
